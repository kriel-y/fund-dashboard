<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐂 基金追踪 · Nora</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d28;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --orange: #f97316;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); padding: 16px; min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px;
  }
  .header h1 { font-size: 20px; }
  .header h1 span { color: var(--yellow); }
  .header .update { font-size: 12px; color: var(--text-dim); }

  /* Stats bar */
  .stats-bar {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 700; }
  .stat-card .sub { font-size: 11px; margin-top: 2px; }
  .up { color: var(--red); } .down { color: var(--green); }

  /* Index row */
  .index-row {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 12px;
  }
  .index-row .section-label {
    font-size: 12px; font-weight: 600; color: var(--cyan); margin-bottom: 10px;
  }
  .index-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
  }
  .index-item {
    background: var(--bg); border-radius: 8px; padding: 8px 10px; text-align: center;
    border: 1px solid transparent; transition: border-color 0.2s;
  }
  .index-item:hover { border-color: var(--border); }
  .index-item .idx-name { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
  .index-item .idx-price { font-size: 14px; font-weight: 700; }
  .index-item .idx-change { font-size: 11px; margin-top: 1px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 0; margin-bottom: 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px 10px 0 0;
    overflow: hidden;
  }
  .tab-btn {
    flex: 1; padding: 10px 16px; border: none; background: transparent;
    color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all 0.2s; text-align: center;
  }
  .tab-btn.active { background: var(--bg); color: var(--yellow); border-bottom: 2px solid var(--yellow); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* Table */
  .table-wrap {
    background: var(--card); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 10px 10px; overflow: hidden; margin-bottom: 12px;
  }
  .table-header {
    display: grid;
    grid-template-columns: 30px 1.5fr 0.9fr 0.7fr 0.7fr 0.7fr 0.55fr 0.55fr 0.5fr;
    padding: 10px 14px; font-size: 11px; color: var(--text-dim);
    border-bottom: 1px solid var(--border); gap: 4px; align-items: center;
  }
  .table-header .sortable {
    cursor: pointer; user-select: none; transition: color 0.15s;
  }
  .table-header .sortable:hover { color: var(--yellow); }
  .table-header .sortable.active { color: var(--yellow); }
  .sort-arrow { font-size: 9px; margin-left: 3px; }
  .fund-row {
    display: grid;
    grid-template-columns: 30px 1.5fr 0.9fr 0.7fr 0.7fr 0.7fr 0.55fr 0.55fr 0.5fr;
    padding: 10px 14px; font-size: 12px; border-bottom: 1px solid var(--border);
    transition: background 0.15s; cursor: pointer; gap: 4px; align-items: center;
  }
  .fund-row:last-child { border-bottom: none; }
  .fund-row:hover { background: rgba(255,255,255,0.03); }
  .fund-row .idx { color: var(--text-dim); font-size: 10px; }
  .fund-row .name { font-weight: 500; display: flex; flex-direction: column; }
  .fund-row .name .code { font-size: 9px; color: var(--text-dim); }
  .fund-row .name .sector { font-size: 9px; color: var(--blue); }
  .fund-row .amt { text-align: right; font-weight: 600; }
  .fund-row .nav { text-align: right; }
  .fund-row .chg { text-align: right; font-weight: 600; }
  .fund-row .pnl { text-align: right; }
  .fund-row .weight { text-align: right; }
  .fund-row .trend-cell { text-align: center; }
  .fund-row .signal { text-align: center; font-size: 14px; }
  .fund-row .action { text-align: center; }

  /* Badges */
  .badge {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    font-size: 9px; font-weight: 500; white-space: nowrap;
  }
  .badge-hold { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-add { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-cut { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-watch { background: rgba(234,179,8,0.15); color: var(--yellow); }

  /* Collapsible sections */
  .collapsible {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px; overflow: hidden;
  }
  .collap-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; cursor: pointer; transition: background 0.15s;
  }
  .collap-head:hover { background: rgba(255,255,255,0.02); }
  .collap-head h3 { font-size: 13px; }
  .collap-arrow { font-size: 11px; color: var(--text-dim); transition: transform 0.2s; }
  .collap-body { padding: 0 16px 14px; display: none; }
  .collap-body.open { display: block; }
  .collap-head.open .collap-arrow { transform: rotate(180deg); }

  /* Radar */
  .radar-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
  }
  .radar-item {
    background: var(--bg); border-radius: 8px; padding: 12px;
  }
  .radar-item .r-title { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .radar-item .r-signal { font-size: 18px; font-weight: 700; }

  /* Strategy tips */
  .strat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .strat-card { background: var(--bg); border-radius: 8px; padding: 12px; }
  .strat-card h4 { font-size: 12px; color: var(--yellow); margin-bottom: 6px; }
  .strat-card ul { list-style: none; font-size: 11px; color: var(--text-dim); line-height: 2; }
  .strat-card ul li::before { content: '• '; color: var(--yellow); }

  /* Add button */
  .add-bar {
    display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
  }
  .add-bar input {
    padding: 8px 12px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 12px; width: 100px;
  }
  .add-bar input:focus { outline: none; border-color: var(--blue); }
  .add-bar input::placeholder { color: var(--text-dim); }
  .add-bar select {
    padding: 8px 12px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 12px;
  }
  .add-bar button {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: opacity 0.2s;
  }
  .btn-add { background: var(--blue); color: white; }
  .btn-hold { background: var(--green); color: white; }
  button:hover { opacity: 0.85; }

  /* Loading */
  .loading {
    text-align: center; padding: 30px; color: var(--text-dim); font-size: 12px;
  }
  .spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 2px solid var(--border); border-top-color: var(--yellow);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Progress bar */
  .progress-bar { width: 100%; height: 2px; background: var(--border); border-radius: 2px; margin-top: 2px; }
  .progress-bar .fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 900px) {
    .index-grid { grid-template-columns: repeat(4, 1fr); }
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .table-header, .fund-row {
      grid-template-columns: 25px 1.3fr 0.8fr 0.7fr 0.7fr;
    }
    .hide-m { display: none; }
  }
  @media (max-width: 600px) {
    .index-grid { grid-template-columns: repeat(3, 1fr); }
    .strat-grid { grid-template-columns: 1fr; }
    .radar-grid { grid-template-columns: 1fr; }
    .table-header, .fund-row {
      grid-template-columns: 20px 1.2fr 0.7fr 0.7fr;
    }
  }
</style>

// sparkline.js — trend sparklines + history fetching for Nora's fund dashboard
// Provides: sparkline(), fetchFundHistory(), loadAllTrends(), injectSparklines()

function sparkline(values, w, h, isUp) {
  if (!values || values.length < 2) return '';
  var min = Math.min.apply(null, values);
  var max = Math.max.apply(null, values);
  var range = max - min || 1;
  var pad = 3, pts = '';
  for (var i = 0; i < values.length; i++) {
    var x = pad + (i / (values.length - 1)) * (w - 2 * pad);
    var y = pad + (1 - (values[i] - min) / range) * (h - 2 * pad);
    pts += x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  }
  var color = isUp ? 'var(--red)' : 'var(--green)';
  var lastX = pad + w - 2*pad;
  var lastY = pad + (1 - (values[values.length-1] - min) / range) * (h - 2*pad);
  return '<svg width="' + w + '" height="' + h + '" style="display:inline-block;vertical-align:middle">'
    + '<polyline points="' + pts.trim() + '" fill="none" stroke="' + color + '" stroke-width="1.2" '
    + 'stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>'
    + '<circle cx="' + lastX.toFixed(1) + '" cy="' + lastY.toFixed(1) + '" r="2" fill="' + color + '" opacity="0.85"/>'
    + '</svg>';
}

const WORKER_URL = 'https://hermes.1239737251.workers.dev';

async function fetchFundHistory(code) {
  var key = 'navhist_' + code;
  var cached = localStorage.getItem(key);
  if (cached) {
    try { var d = JSON.parse(cached); if (d && d.length >= 5) return d; } catch(_) {}
  }
  try {
    var resp = await fetch(WORKER_URL + '/history/' + code);
    var text = await resp.text();
    var m = text.match(/jQuery\(([\s\S]+)\)/);
    if (m) {
      var data = JSON.parse(m[1]);
      if (data && data.Data && data.Data.LSJZList && data.Data.LSJZList.length > 5) {
        var navs = data.Data.LSJZList.map(function(x) { return parseFloat(x.NAV); }).filter(function(x) { return x && !isNaN(x); }).reverse();
        if (navs.length >= 5) {
          localStorage.setItem('navhist_' + code, JSON.stringify(navs));
          return navs;
        }
      }
    }
  } catch(_) {}
  try {
    var data = await jsonp('https://api.fund.eastmoney.com/f10/lsjz?fundCode=' + code + '&pageIndex=1&pageSize=25', 8000);
    if (data && data.Data && data.Data.LSJZList && data.Data.LSJZList.length > 5) {
      var navs = data.Data.LSJZList.map(function(x) { return parseFloat(x.NAV); })
        .filter(function(x) { return x && !isNaN(x); }).reverse();
      if (navs.length >= 5) {
        localStorage.setItem(key, JSON.stringify(navs));
        return navs;
      }
    }
  } catch(_) {}
  if (typeof PRECOMPUTED_NAV !== 'undefined' && PRECOMPUTED_NAV[code]) {
    var d = PRECOMPUTED_NAV[code];
    return [d.navPrev || d.nav, d.nav].filter(function(x) { return x && !isNaN(x); });
  }
  return null;
}

var trendCache = {};

async function loadAllTrends(funds) {
  var promises = funds.map(function(f) {
    return fetchFundHistory(f.code).then(function(navs) {
      if (navs && navs.length > 1) {
        trendCache[f.code] = navs;
        var row = document.querySelector('.fund-row[data-code="' + f.code + '"]');
        if (row) {
          var td = row.querySelector('.trend-cell');
          if (td) {
            td.innerHTML = sparkline(navs, 55, 20, parseFloat(f.change || 0) >= 0);
          }
        }
      }
    }).catch(function() {});
  });
  await Promise.allSettled(promises);
}

function injectSparklines() {
  var rows = document.querySelectorAll('.fund-row');
  rows.forEach(function(row) {
    if (!row.querySelector('.trend-cell')) {
      var signalCell = row.querySelector('.signal');
      if (signalCell) {
        var td = document.createElement('div');
        td.className = 'trend-cell hide-m';
        td.innerHTML = '<span style="font-size:10px;color:var(--text-dim)">...</span>';
        signalCell.parentNode.insertBefore(td, signalCell);
      }
    }
  });
}

// ================================================================
// JSONP HELPER
// ================================================================
function jsonp(url, timeout=6000) {
  return new Promise((resolve, reject) => {
    const cb = 'jpcb_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    window[cb] = function(data) { delete window[cb]; const s = document.getElementById('_js_'+cb); if(s)s.remove(); resolve(data); };
    const script = document.createElement('script');
    script.id = '_js_'+cb;
    const sep = url.includes('?') ? '&' : '?';
    script.src = url + sep + 'callback=' + cb;
    script.onerror = () => { delete window[cb]; const s = document.getElementById('_js_'+cb); if(s)s.remove(); reject(new Error('load fail')); };
    setTimeout(() => { if(window[cb]) { delete window[cb]; const s = document.getElementById('_js_'+cb); if(s)s.remove(); reject(new Error('timeout')); } }, timeout);
    document.head.appendChild(script);
  });
}

async function fetchFundNav(code) {
  // 1. Cloudflare Worker proxy (bypasses corp firewall)
  try {
    const resp = await fetch(WORKER_URL + '/fund/' + code);
    const text = await resp.text();
    const m = text.match(/jsonpgz\(([\s\S]+)\)/);
    if (m) {
      const data = JSON.parse(m[1]);
      if (data && data.gsz !== undefined) {
        navSource = 'live';
        return {nav:parseFloat(data.gsz)||0, navPrev:parseFloat(data.dwjz)||0, change:parseFloat(data.gszzl)||0, navDate:data.jzrq||''};
      }
    }
  } catch(_) {}
  
  // 2. fundgz direct JSONP (fallback)
  try {
    const data = await jsonp(`https://fundgz.1234567.com.cn/js/${code}.js`, 5000);
    if (data && data.gsz !== undefined) {
      navSource = 'live';
      return {nav:parseFloat(data.gsz)||0, navPrev:parseFloat(data.dwjz)||0, change:parseFloat(data.gszzl)||0, navDate:data.jzrq||''};
    }
  } catch(_) {}
  // 2. History API (lsjz)
  try {
    const data = await jsonp(`https://api.fund.eastmoney.com/f10/lsjz?fundCode=${code}&pageIndex=1&pageSize=5`, 5000);
    if (data && data.Data && data.Data.LSJZList && data.Data.LSJZList.length>0) {
      const list = data.Data.LSJZList;
      const latest = list[0], prev = list[1]||list[0];
      navSource = 'live';
      return {nav:parseFloat(latest.NAV)||0, navPrev:parseFloat(prev.NAV)||0, change:prev?((parseFloat(latest.NAV)-parseFloat(prev.NAV))/parseFloat(prev.NAV)*100):0, navDate:latest.FSRQ||''};
    }
  } catch(_) {}
  // 3. Local JSON fallback
  try {
    const resp = await fetch('precomputed_nav.json', {cache:'no-cache'});
    if (resp.ok) {
      const cached = await resp.json();
      if (cached[code]) {
        const d = cached[code];
        return {nav:d.nav, navPrev:d.navPrev||d.nav, change:d.change||0, navDate:d.navDate||''};
      }
    }
  } catch(_) {}
  // 4. Inline precomputed (hardcoded)
  if (PRECOMPUTED_NAV[code]) {
    const d = PRECOMPUTED_NAV[code];
    return {nav:d.nav, navPrev:d.navPrev||d.nav, change:d.change||0, navDate:d.navDate||''};
  }
  return null;
}

const INDEX_CODES = [
  {key:'1.000001',sina:'s_sh000001',name:'上证指数'},

async function fetchIndices() {
  // 1. Precomputed index JSON (most reliable, cron-updated daily)
  try {
    const resp = await fetch('precomputed_index.json', {cache:'no-cache'});
    if (resp.ok) {
      const data = await resp.json();
      if (data && data.length > 0) return data;
    }
  } catch(_) {}

  // 2. Cloudflare Worker proxy
  try {
    const resp = await fetch(WORKER_URL + '/index');
    const text = await resp.text();
    const lines = text.split('\n');
    const nameMap = {'hq_str_s_sh000001':'\u4e0a\u8bc1\u6307\u6570','hq_str_s_sz399001':'\u6df1\u8bc1\u6210\u6307','hq_str_s_sz399006':'\u521b\u4e1a\u677f\u6307','hq_str_s_sh000688':'\u79d1\u521b50','hq_str_s_sh000300':'\u6caa\u6df1300','hq_str_s_sh000016':'\u4e0a\u8bc150','hq_str_s_sz399852':'\u4e2d\u8bc11000'};
    const indices = [];
    lines.forEach(function(line) {
      line = line.trim();
      if (!line || !line.includes('=')) return;
      const parts = line.split('=');
      const varName = parts[0].replace('var ','').trim();
      const val = parts[1].trim().replace(/"/g,'');
      const vals = val.split(',');
      const name = nameMap[varName];
      if (name) {
        indices.push({name: name, price: parseFloat(vals[1])||0, changeAmt: parseFloat(vals[2])||0, changePct: parseFloat(vals[3])||0});
      }
    });
    if (indices.length >= 6) return indices;
  } catch(_) {}
  // 3. Sina API via script tag
  try {
    const result = await new Promise((resolve) => {
      const script = document.createElement('script');
      script.src = 'https://hq.sinajs.cn/list=' + INDEX_CODES.map(c=>c.sina).join(',');
      let done = false;
      const finish = (val) => { if(done)return; done=true; clearTimeout(t); script.remove(); resolve(val); };
      const t = setTimeout(() => finish(null), 8000);
      script.onload = () => {
        setTimeout(() => {
          const indices = [];
          INDEX_CODES.forEach(c => {
            const raw = window['hq_str_' + c.sina];
            if (raw) {
              const parts = raw.split(',');
              indices.push({name:c.name, price:parseFloat(parts[1])||0, changeAmt:parseFloat(parts[2])||0, changePct:parseFloat(parts[3])||0});
            }
          });
          finish(indices.length>0 ? indices : null);
        }, 200);
      };
      script.onerror = () => finish(null);
      document.head.appendChild(script);
    });
    if (result) return result;
  } catch(_) {}

  // 3. eastmoney JSONP fallback
  try {
    const secids = INDEX_CODES.map(c=>c.key).join(',');
    const data = await jsonp(`https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&fields=f2,f3,f4,f12,f14&secids=${secids}`, 8000);
    if (data && data.data && data.data.diff) {
      const nameMap = {}; INDEX_CODES.forEach(c => { nameMap[c.key] = c.name; });
      return data.data.diff.map(item => ({
        name: nameMap[item.f12] || item.f14 || item.f12,
        price: item.f2, changePct: item.f3, changeAmt: item.f4,
      }));
    }
  } catch(_) {}

  return null;
}

function getEntrySignal(fund) {
  const chg = parseFloat(fund.change||0);
  const pnlRate = fund.pnlRate !== undefined ? fund.pnlRate : 0;
  if (pnlRate<-10 && chg<-1.5) return {icon:'🟢',tip:'超跌补仓'};
  if (pnlRate<-10) return {icon:'🟢',tip:'逢低布局'};
  if (pnlRate>15 && chg>1) return {icon:'🔴',tip:'止盈信号'};
  if (pnlRate>10) return {icon:'🟡',tip:'注意止盈'};
  if (chg<-2) return {icon:'🔵',tip:'小幅补仓'};
  if (chg<-1.5 && pnlRate<-5) return {icon:'🔵',tip:'加仓机会'};
  if (chg>2) return {icon:'🟠',tip:'追高风险'};
  return {icon:'⚪',tip:'正常持有'};
}
function getAdvice(fund) {
  const pnlRate = fund.pnlRate||0; const change = fund.change||0;
  if (pnlRate>15) return {label:'🔔 止盈',cls:'cut'};
  if (pnlRate>8) return {label:'📊 持有',cls:'hold'};
  if (pnlRate<-15) return {label:'⚠️ 补仓',cls:'watch'};
  if (pnlRate<-8) return {label:'👀 关注',cls:'hold'};
  if (change<-2) return {label:'📉 补仓',cls:'add'};
  return {label:'✅ 持有',cls:'hold'};
}

  if (!code || code.length!==6) { alert('请输入6位基金代码'); return; }
  if (HOLDINGS.some(f=>f.code===code)) { alert('该基金已在持仓中'); return; }
  if (WATCHLIST.some(f=>f.code===code)) { alert('该基金已在关注中'); return; }
  WATCHLIST.push({code,sector:sector||undefined,name:code});
  saveWatchlist();
  document.getElementById('addCode').value='';
  refreshData();
}

function removeFund(code) {
  if (!confirm('确定删除？')) return;
  HOLDINGS = HOLDINGS.filter(f=>f.code!==code);
  WATCHLIST = WATCHLIST.filter(f=>f.code!==code);
  saveHoldings(); saveWatchlist();
  refreshData();
}

// ================================================================
// MAIN
// ================================================================
async function refreshData() {
  const data = currentTab==='holdings' ? HOLDINGS : WATCHLIST;

  // Fetch NAV for all funds
  const promises = data.map(f => fetchFundNav(f.code).then(r=>({...f,...r,change:r?r.change:f.change||0,nav:r?r.nav:f.nav})));
  const results = await Promise.allSettled(promises);
  const updated = results.filter(r=>r.status==='fulfilled').map(r=>r.value);

  if (updated.length===0) {
    document.getElementById('fundList').innerHTML = '<div class="loading">📡 数据获取失败，请检查网络后刷新页面</div>';
    document.getElementById('updateTime').textContent = '⚠️ 数据不可用';
    return;
  }

  // If holdings tab, merge NAV back into HOLDINGS
  if (currentTab==='holdings') {
    updated.forEach(f => {
      const idx = HOLDINGS.findIndex(h=>h.code===f.code);
      if (idx>=0) {
        HOLDINGS[idx].nav = f.nav;
        HOLDINGS[idx].change = f.change;
        HOLDINGS[idx].navPrev = f.navPrev;
        HOLDINGS[idx].navDate = f.navDate;
      }
    });
    const totalAmt = HOLDINGS.reduce((s,f)=>s+(f.amount||0),0);
    renderStats(HOLDINGS);
    renderTable(updated, totalAmt);
    renderRadar(HOLDINGS);
    renderStrategy(HOLDINGS);
  } else {
    // Also update WATCHLIST NAV data
    updated.forEach(f => {
      const idx = WATCHLIST.findIndex(w=>w.code===f.code);
      if (idx>=0) {
        WATCHLIST[idx].nav = f.nav;
        WATCHLIST[idx].change = f.change;
      }
    });
    renderTable(updated, 0);
  }

  // Update counts
  document.getElementById('holdingCount').textContent = `(${HOLDINGS.length})`;
  document.getElementById('watchCount').textContent = `(${WATCHLIST.length})`;

  const now = new Date();
  document.getElementById('updateTime').textContent = '🕐 更新于 ' + now.toLocaleTimeString('zh-CN');
}

async function init() {
  loadData();
  // Initial render
  const totalAmt = HOLDINGS.reduce((s,f)=>s+(f.amount||0),0);
  renderStats(HOLDINGS);
  renderTable(HOLDINGS, totalAmt);
  renderRadar(HOLDINGS);
  renderStrategy(HOLDINGS);
  document.getElementById('holdingCount').textContent = `(${HOLDINGS.length})`;
  document.getElementById('watchCount').textContent = `(${WATCHLIST.length})`;

  // Fetch indices (non-blocking)
  fetchIndices().then(indices => renderIndices(indices));
  // Fetch NAV and refresh
  refreshData();
  // Auto-refresh every 5 min
  setInterval(refreshData, 300000);
  setTimeout(function() { injectSparklines(); loadAllTrends(HOLDINGS); }, 2500);
}

init();
</script>
